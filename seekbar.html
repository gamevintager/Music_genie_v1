<!DOCTYPE html>
<html>

<head>

<style>

body{
    margin:0;
    padding:0;
    background:transparent;
}

#track{

    width:100%;
    height:10px;

    background:#2a1638;

    border-radius:20px;

    cursor:pointer;

    overflow:hidden;
}

#fill{

    height:100%;

    width:0%;

    background:linear-gradient(
        90deg,
        #ff4fd8,
        #ff80ea
    );

    transition:width .15s linear;
}

</style>

</head>

<body>

<div id="track">

<div id="fill"></div>

</div>

</body>

</html>
